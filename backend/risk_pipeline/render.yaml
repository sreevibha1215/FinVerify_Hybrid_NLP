services:
  - type: web
    name: hybrid-risk-classifier
    env: docker
    plan: starter # Starter (2GB RAM) is required for FinBERT
    region: ohio # Change to your preferred region
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard securely
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true
